on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (format: vX.Y.Z)"
        required: true
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

name: Release Fork macOS

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release-macos:
    runs-on: macos-15
    timeout-minutes: 120
    outputs:
      version: ${{ steps.meta.outputs.version }}
      build: ${{ steps.meta.outputs.build }}
      commit: ${{ steps.meta.outputs.commit }}
      commit_long: ${{ steps.meta.outputs.commit_long }}
      repo_name: ${{ steps.meta.outputs.repo_name }}
      product_name: ${{ steps.meta.outputs.product_name }}
      product_slug: ${{ steps.meta.outputs.product_slug }}
      appcast_url: ${{ steps.meta.outputs.appcast_url }}
      dmg_name: ${{ steps.meta.outputs.dmg_name }}
      publish_appcast: ${{ steps.update_mode.outputs.publish_appcast }}
    env:
      PRODUCT_NAME: Glossolalia
      PRODUCT_SLUG: glossolalia
      PRODUCT_BUNDLE_ID: dev.glossolalia.app
      PRODUCT_EXECUTABLE: glossolalia
      PRODUCT_ICON_NAME: Ghostty
      PRODUCT_MINIMUM_SYSTEM_VERSION: 13.0.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
            VERSION="${VERSION#v}"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must follow X.Y.Z"
            exit 1
          fi

          BUILD="$(git rev-list --count HEAD)"
          COMMIT="$(git rev-parse --short HEAD)"
          COMMIT_LONG="$(git rev-parse HEAD)"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          APPCAST_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/appcast.xml"
          APPCAST_TIP_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/appcast-tip.xml"
          RELEASE_NOTES_URL_TEMPLATE="https://github.com/${GITHUB_REPOSITORY}/releases/tag/v{version}"
          COMPARE_URL_TEMPLATE="https://github.com/${GITHUB_REPOSITORY}/compare/{current}...{new}"
          COMMIT_URL_TEMPLATE="https://github.com/${GITHUB_REPOSITORY}/commit/{new}"
          APP_NAME="${PRODUCT_NAME}.app"
          DMG_NAME="${PRODUCT_NAME}.dmg"
          ZIP_NAME="${PRODUCT_SLUG}-macos-universal.zip"
          DSYM_NAME="${PRODUCT_SLUG}-macos-universal-dsym.zip"

          {
            echo "version=$VERSION"
            echo "build=$BUILD"
            echo "commit=$COMMIT"
            echo "commit_long=$COMMIT_LONG"
            echo "repo_name=$REPO_NAME"
            echo "product_name=${PRODUCT_NAME}"
            echo "product_slug=${PRODUCT_SLUG}"
            echo "appcast_url=$APPCAST_URL"
            echo "dmg_name=$DMG_NAME"
            echo "app_name=$APP_NAME"
            echo "zip_name=$ZIP_NAME"
            echo "dsym_name=$DSYM_NAME"
            echo "appcast_tip_url=$APPCAST_TIP_URL"
            echo "release_notes_url_template=$RELEASE_NOTES_URL_TEMPLATE"
            echo "compare_url_template=$COMPARE_URL_TEMPLATE"
            echo "commit_url_template=$COMMIT_URL_TEMPLATE"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve update mode
        id: update_mode
        run: |
          if [[ -n "${{ secrets.SPARKLE_PUBLIC_ED_KEY }}" && -n "${{ secrets.SPARKLE_PRIVATE_ED_KEY }}" ]]; then
            echo "publish_appcast=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_appcast=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Sparkle
        if: ${{ steps.update_mode.outputs.publish_appcast == 'true' }}
        env:
          SPARKLE_VERSION: 2.9.0
        run: |
          mkdir -p .action/sparkle
          cd .action/sparkle
          curl -L "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-for-Swift-Package-Manager.zip" > sparkle.zip
          unzip -q sparkle.zip
          echo "$(pwd)/bin" >> "$GITHUB_PATH"

      - name: Build GhosttyKit
        run: |
          zig build \
            -Doptimize=ReleaseFast \
            -Demit-macos-app=false \
            -Dversion-string=${{ steps.meta.outputs.version }}

      - name: Build app
        run: |
          cd macos
          xcodebuild -target Ghostty -configuration Release \
            GLOSSOLALIA_APP_PRODUCT_NAME="${{ steps.meta.outputs.product_name }}" \
            GLOSSOLALIA_APP_DISPLAY_NAME="${{ steps.meta.outputs.product_name }}" \
            GLOSSOLALIA_DEBUG_APP_DISPLAY_NAME="${{ steps.meta.outputs.product_name }}[DEBUG]" \
            GLOSSOLALIA_APP_ICON_NAME="${PRODUCT_ICON_NAME}" \
            GLOSSOLALIA_EXECUTABLE_NAME="${PRODUCT_EXECUTABLE}" \
            GLOSSOLALIA_BUNDLE_ID="${PRODUCT_BUNDLE_ID}" \
            GLOSSOLALIA_DEBUG_BUNDLE_ID="${PRODUCT_BUNDLE_ID}.debug" \
            GLOSSOLALIA_DOCK_TILE_PRODUCT_NAME="DockTilePlugin" \
            GLOSSOLALIA_DOCK_TILE_DISPLAY_NAME="${{ steps.meta.outputs.product_name }} Dock Tile Plugin" \
            GLOSSOLALIA_DOCK_TILE_BUNDLE_ID="${PRODUCT_BUNDLE_ID}-dock-tile" \
            GLOSSOLALIA_NOTIFICATION_NAMESPACE="${PRODUCT_BUNDLE_ID}" \
            GLOSSOLALIA_DEFAULTS_SUITE_NAME="${PRODUCT_BUNDLE_ID}" \
            GLOSSOLALIA_SURFACE_UTI="${PRODUCT_BUNDLE_ID}.surface-id" \
            GLOSSOLALIA_RELEASE_NOTES_URL_TEMPLATE="${{ steps.meta.outputs.release_notes_url_template }}" \
            GLOSSOLALIA_COMPARE_URL_TEMPLATE="${{ steps.meta.outputs.compare_url_template }}" \
            GLOSSOLALIA_COMMIT_URL_TEMPLATE="${{ steps.meta.outputs.commit_url_template }}" \
            GLOSSOLALIA_UPDATE_STABLE_FEED_URL="${{ steps.meta.outputs.appcast_url }}" \
            GLOSSOLALIA_UPDATE_TIP_FEED_URL="${{ steps.meta.outputs.appcast_tip_url }}" \
            COMPILATION_CACHE_KEEP_CAS_DIRECTORY=YES

      - name: Update built Info.plist
        env:
          SPARKLE_KEY_PUB: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          APP_PATH="macos/build/Release/${{ steps.meta.outputs.app_name }}"
          /usr/libexec/PlistBuddy -c "Set :GhosttyCommit ${{ steps.meta.outputs.commit }}" "$APP_PATH/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ steps.meta.outputs.build }}" "$APP_PATH/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.meta.outputs.version }}" "$APP_PATH/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :SUEnableAutomaticChecks" "$APP_PATH/Contents/Info.plist" || true
          if [[ -n "$SPARKLE_KEY_PUB" ]]; then
            /usr/libexec/PlistBuddy -c "Set :SUPublicEDKey $SPARKLE_KEY_PUB" "$APP_PATH/Contents/Info.plist"
          else
            /usr/libexec/PlistBuddy -c "Delete :SUPublicEDKey" "$APP_PATH/Contents/Info.plist" || true
          fi

      - name: Codesign app bundle
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_CERTIFICATE_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
          MACOS_CI_KEYCHAIN_PWD: ${{ secrets.MACOS_CI_KEYCHAIN_PWD }}
        run: |
          APP_PATH="macos/build/Release/${{ steps.meta.outputs.app_name }}"
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_CI_KEYCHAIN_PWD" build.keychain

          /usr/bin/codesign --verbose -f -s "$MACOS_CERTIFICATE_NAME" -o runtime "$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions/B/XPCServices/Downloader.xpc"
          /usr/bin/codesign --verbose -f -s "$MACOS_CERTIFICATE_NAME" -o runtime "$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions/B/XPCServices/Installer.xpc"
          /usr/bin/codesign --verbose -f -s "$MACOS_CERTIFICATE_NAME" -o runtime "$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions/B/Autoupdate"
          /usr/bin/codesign --verbose -f -s "$MACOS_CERTIFICATE_NAME" -o runtime "$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions/B/Updater.app"
          /usr/bin/codesign --verbose -f -s "$MACOS_CERTIFICATE_NAME" -o runtime "$APP_PATH/Contents/Frameworks/Sparkle.framework"
          /usr/bin/codesign --verbose -f -s "$MACOS_CERTIFICATE_NAME" -o runtime "$APP_PATH/Contents/PlugIns/DockTilePlugin.plugin"
          /usr/bin/codesign --verbose -f -s "$MACOS_CERTIFICATE_NAME" -o runtime --entitlements "macos/Ghostty.entitlements" "$APP_PATH"

      - name: Create DMG
        env:
          MACOS_CERTIFICATE_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
        run: |
          npm install --global create-dmg
          APP_PATH="macos/build/Release/${{ steps.meta.outputs.app_name }}"
          create-dmg --identity="$MACOS_CERTIFICATE_NAME" "$APP_PATH" ./
          mv ./*.dmg "${{ steps.meta.outputs.dmg_name }}"

      - name: Notarize DMG
        env:
          APPLE_NOTARIZATION_ISSUER: ${{ secrets.APPLE_NOTARIZATION_ISSUER }}
          APPLE_NOTARIZATION_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
          APPLE_NOTARIZATION_KEY: ${{ secrets.APPLE_NOTARIZATION_KEY }}
        run: |
          APP_PATH="macos/build/Release/${{ steps.meta.outputs.app_name }}"
          echo "$APPLE_NOTARIZATION_KEY" > notarization_key.p8
          xcrun notarytool store-credentials "notarytool-profile" --key notarization_key.p8 --key-id "$APPLE_NOTARIZATION_KEY_ID" --issuer "$APPLE_NOTARIZATION_ISSUER"
          rm notarization_key.p8
          xcrun notarytool submit "${{ steps.meta.outputs.dmg_name }}" --keychain-profile "notarytool-profile" --wait
          xcrun stapler staple "${{ steps.meta.outputs.dmg_name }}"
          xcrun stapler staple "$APP_PATH"

      - name: Zip app and symbols
        run: |
          cd macos/build/Release
          zip -9 -r --symlinks "../../../${{ steps.meta.outputs.zip_name }}" "${{ steps.meta.outputs.app_name }}"
          zip -9 -r --symlinks "../../../${{ steps.meta.outputs.dsym_name }}" "${{ steps.meta.outputs.app_name }}.dSYM"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: ${{ steps.meta.outputs.product_name }} v${{ steps.meta.outputs.version }}
          files: |
            ${{ steps.meta.outputs.dmg_name }}
            ${{ steps.meta.outputs.zip_name }}
            ${{ steps.meta.outputs.dsym_name }}

      - name: Generate appcast
        if: ${{ steps.update_mode.outputs.publish_appcast == 'true' }}
        env:
          PRODUCT_NAME: ${{ steps.meta.outputs.product_name }}
          PRODUCT_VERSION: ${{ steps.meta.outputs.version }}
          PRODUCT_BUILD: ${{ steps.meta.outputs.build }}
          PRODUCT_COMMIT: ${{ steps.meta.outputs.commit }}
          PRODUCT_COMMIT_LONG: ${{ steps.meta.outputs.commit_long }}
          PRODUCT_MINIMUM_SYSTEM_VERSION: ${{ env.PRODUCT_MINIMUM_SYSTEM_VERSION }}
          PRODUCT_REPOSITORY_URL: https://github.com/${{ github.repository }}
          PRODUCT_RELEASE_NOTES_URL_TEMPLATE: ${{ steps.meta.outputs.release_notes_url_template }}
          PRODUCT_DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/download/v${{ steps.meta.outputs.version }}/${{ steps.meta.outputs.dmg_name }}
          APPCAST_OUTPUT: site/appcast.xml
          APPCAST_FILE: site/appcast.xml
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          mkdir -p site
          printf '%s' "$SPARKLE_PRIVATE_ED_KEY" > signing.key
          sign_update -f signing.key "${{ steps.meta.outputs.dmg_name }}" > sign_update.txt
          python3 dist/macos/update_appcast_fork.py

      - name: Upload Pages artifact
        if: ${{ steps.update_mode.outputs.publish_appcast == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: release-macos
    if: ${{ needs.release-macos.outputs.publish_appcast == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
